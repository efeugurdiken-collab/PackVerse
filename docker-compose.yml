services:
  db:
    # pgvector/pgvector:pg16 (Sprint P10B1) is built on top of postgres:16 -
    # same major version as the plain postgres:16-alpine image this
    # replaces, so the existing packverse_pgdata volume stays binary-
    # compatible (no reinit needed). Needed to CREATE EXTENSION vector -
    # see backend/alembic/versions/ad3f998eece8_*.py.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-packverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-packverse}
      POSTGRES_DB: ${POSTGRES_DB:-packverse}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - packverse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-packverse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
      # Mounted as a real file (not just injected via env_file: above) so
      # app/core/config.py's development JWT-secret auto-generation can
      # append JWT_SECRET_KEY back to the host's .env - see Sprint P3's
      # JWT-Development-Automation change. env_file: still wins for the
      # values already in it (docker-compose sets those directly as
      # container env vars, which take priority over reading the file).
      - ./.env:/app/.env
      # Local storage backend's root (Sprint P4) - a named volume, not a
      # bind mount, since uploaded files are app data, not source: this
      # keeps them out of the host's backend/ tree entirely (nothing to
      # accidentally git add) while still persisting across container
      # restarts. STORAGE_LOCAL_ROOT=./data/storage resolves to /app/data/storage
      # inside the container, which is exactly where this volume is mounted.
      - packverse_storage:/app/data/storage

  worker:
    # Sprint P8: same image as `backend` (identical build context/
    # Dockerfile - the worker is pure Python, no separate dependencies),
    # just a different process/command. Overrides the image's default
    # HEALTHCHECK (which curls the API's own /health on :8000 - this
    # container runs no HTTP server at all) with app/worker/healthcheck.py,
    # a small script that checks this specific worker_id's own freshness
    # in the worker_heartbeats table - see that module's docstring.
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      # Stable, predictable worker_id instead of the container-hostname
      # default (see app/worker/runner.py's default_worker_id) - makes
      # `docker compose logs worker` / healthcheck output identifiable
      # across restarts without needing to look up the container id.
      WORKER_ID: packverse-worker-1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
      - ./.env:/app/.env
      - packverse_storage:/app/data/storage
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker.healthcheck"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  packverse_pgdata:
  packverse_storage:
