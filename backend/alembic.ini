[alembic]
script_location = alembic
prepend_sys_path = .
# Recent Alembic versions (>=1.13) warn "No path_separator found in
# configuration" unless this is set explicitly, even with a single
# script_location and no version_locations override - version_path_separator
# alone (kept below for older Alembic compatibility) isn't read by the
# newer check.
path_separator = os
version_path_separator = os

# sqlalchemy.url is intentionally left blank here - it is set at runtime
# in alembic/env.py from app.core.config.Settings, so there is exactly
# one source of truth for the database connection string.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
