name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Start db and backend
        run: docker compose up --build -d db backend

      - name: Wait for db + backend health
        run: |
          for i in $(seq 1 30); do
            db_status="$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q db)" 2>/dev/null || true)"
            backend_status="$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q backend)" 2>/dev/null || true)"
            if [ "$db_status" = "healthy" ] && [ "$backend_status" = "healthy" ]; then
              echo "db and backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "timed out waiting for db/backend health"
          docker compose logs
          exit 1

      - name: Run migrations
        run: docker compose exec -T backend alembic upgrade head

      - name: Start worker
        run: docker compose up --build -d worker

      - name: Wait for backend + worker health
        run: |
          for i in $(seq 1 30); do
            backend_status="$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q backend)" 2>/dev/null || true)"
            worker_status="$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q worker)" 2>/dev/null || true)"
            if [ "$backend_status" = "healthy" ] && [ "$worker_status" = "healthy" ]; then
              echo "backend and worker healthy"
              exit 0
            fi
            sleep 2
          done
          echo "timed out waiting for backend/worker health"
          docker compose logs
          exit 1

      - name: Run verify.sh
        run: ./verify.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
